name: Cross-Platform Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
        python-version:
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs cleanly
        run: python -m pyRTC.scripts.validate_dist_install --dist-dir dist

      - name: Run ruff lint checks
        run: ruff check pyRTC tests benchmarks

      - name: Verify import
        run: python -c "import pyRTC; print('pyRTC import OK')"

      - name: Run pytest with coverage
        run: pytest
name: Publish Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependencies
        run: python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs cleanly
        run: python -m pyRTC.scripts.validate_dist_install --dist-dir dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist/*

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyrtcao

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/pyrtcao/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
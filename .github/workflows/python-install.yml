name: Python Install

on:
  push:
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run ruff lint checks (staged scope)
        run: ruff check pyRTC/__init__.py pyRTC/pyRTCComponent.py pyRTC/Telemetry.py pyRTC/Modulator.py pyRTC/Optimizer.py pyRTC/ScienceCamera.py pyRTC/WavefrontSensor.py pyRTC/WavefrontCorrector.py pyRTC/Loop.py pyRTC/SlopesProcess.py pyRTC/Pipeline.py pyRTC/hardware/__init__.py pyRTC/hardware/ALPAODM.py pyRTC/hardware/NCPAOptimizer.py pyRTC/hardware/OOPAOInterface.py pyRTC/hardware/PIDOptimizer.py pyRTC/hardware/PIModulator.py pyRTC/hardware/SpinnakerScienceCam.py pyRTC/hardware/loopHyperparamsOptimizer.py pyRTC/hardware/ximeaWFS.py pyRTCView/pyRTCView.py pyRTCView/measure_latency.py pyRTCView/monitor1DShm.py pyRTCView/clearShms.py tests/test_public_api.py

      - name: Verify import
        run: python -c "import pyRTC; print('pyRTC import OK')"

      - name: Run pytest with coverage
        run: pytest
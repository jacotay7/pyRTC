name: Python Install

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs cleanly
        run: python pyRTC/scripts/validate_dist_install.py --dist-dir dist

      - name: Run ruff lint checks
        run: ruff check pyRTC tests benchmarks

      - name: Verify import
        run: python -c "import pyRTC; print('pyRTC import OK')"

      - name: Run pytest with coverage
        run: pytest

  smoke-system-notebook:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Verify built wheel installs cleanly
        run: python pyRTC/scripts/validate_dist_install.py --dist-dir dist

      - name: Run system and notebook smoke tests
        run: pytest tests/system tests/notebooks -q --no-cov

      - name: Run performance smoke report
        run: python benchmarks/perf_smoke.py --output benchmarks/perf_smoke_report.json

      - name: Print performance dictionaries
        run: |
          python - <<'PY'
          import json
          with open('benchmarks/perf_smoke_report.json', 'r', encoding='utf-8') as f:
              report = json.load(f)
          print(json.dumps(report, indent=2))
          PY

      - name: Compare against committed perf baseline
        run: python benchmarks/check_perf_baseline.py --current benchmarks/perf_smoke_report.json --baseline benchmarks/perf_smoke_baseline.json

      - name: Upload performance smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report-py${{ matrix.python-version }}
          path: benchmarks/perf_smoke_report.json

  docs:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with docs dependencies
        run: python -m pip install .[docs]

      - name: Build documentation
        run: sphinx-build -b html docs/source docs/source/_build/html
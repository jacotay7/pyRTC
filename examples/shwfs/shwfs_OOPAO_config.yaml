oopao:
  className: pyRTC.hardware.OOPAOInterface.OOPAOInterface
  classFile: ../../pyRTC/hardware/OOPAOInterface.py
  paramFile: shwfs_OOPAO_params.yaml
  wfcSection: wfc
  useAtmosphere: false
  inputStreams: {}
  outputStreams: {}
loop:
  gain: 0.1
  leakyGain: 0.01
  numDroppedModes: 0
  pokeAmp: 1.0e-07
  numItersIM: 10
  conditioning: 10
  affinity: 2
  method: push-pull
  className: Loop
  inputStreams:
    signal: signal
  outputStreams:
    wfc: wfc
  functions:
  - leakyIntegrator
  classFile: ../../pyRTC/Loop.py
wfs:
  name: OOPAOSH
  width: 120
  height: 120
  darkCount: 1000
  affinity: 3
  className: pyRTC.hardware.OOPAOInterface.OOPAOWFSensor
  resource: oopao
  inputStreams: {}
  outputStreams:
    wfsRaw: wfsRaw
    wfs: wfs
  functions:
  - expose
  classFile: ../../pyRTC/hardware/OOPAOInterface.py
slopes:
  type: SHWFS
  signalType: slopes
  affinity: 4
  contrast: 0.0
  subApSpacing: 6
  subApOffsetX: 0
  subApOffsetY: 0
  className: SlopesProcess
  inputStreams:
    wfs: wfs
  outputStreams:
    signal: signal
    signal2D: signal2D
  functions:
  - computeSignal
  classFile: ../../pyRTC/SlopesProcess.py
wfc:
  name: OOPAOWFC
  numActuators: 441
  numModes: 80
  flatFile: ''
  saveFile: flat.npy
  m2cFile: ''
  affinity: 3
  commandCap: 0.8
  hardwareDelay: 0.001
  frameDelay: 0
  className: pyRTC.hardware.OOPAOInterface.OOPAOWFCorrector
  resource: oopao
  inputStreams:
    wfc: wfc
  outputStreams:
    wfc: wfc
    wfc2D: wfc2D
  functions:
  - sendToHardware
  classFile: ../../pyRTC/hardware/OOPAOInterface.py
psf:
  name: OOPAOPSF
  index: 0
  width: 300
  height: 300
  darkCount: 10
  integration: 5
  affinity: 3
  className: pyRTC.hardware.OOPAOInterface.OOPAOScienceCamera
  resource: oopao
  inputStreams: {}
  outputStreams:
    psfShort: psfShort
    psfLong: psfLong
    strehl: strehl
    tiptilt: tiptilt
  functions:
  - expose
  - integrate
  classFile: ../../pyRTC/hardware/OOPAOInterface.py
manager:
  mode: soft-rtc
  componentClasses:
    oopao: pyRTC.hardware.OOPAOInterface.OOPAOInterface
    loop: pyRTC.Loop.Loop
    wfs: pyRTC.hardware.OOPAOInterface.OOPAOWFSensor
    slopes: pyRTC.SlopesProcess.SlopesProcess
    wfc: pyRTC.hardware.OOPAOInterface.OOPAOWFCorrector
    psf: pyRTC.hardware.OOPAOInterface.OOPAOScienceCamera
  componentFiles:
    oopao: ../../pyRTC/hardware/OOPAOInterface.py
    loop: ../../pyRTC/Loop.py
    wfs: ../../pyRTC/hardware/OOPAOInterface.py
    slopes: ../../pyRTC/SlopesProcess.py
    wfc: ../../pyRTC/hardware/OOPAOInterface.py
    psf: ../../pyRTC/hardware/OOPAOInterface.py
metadata: {}
streams: {}
resources: {}
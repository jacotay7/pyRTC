wfs:
  name: SyntheticSHWFS
  width: 32
  height: 32
  darkCount: 16
  className: SyntheticSHWFS
  frameRateHz: 200.0
  subApSpacing: 8
  subApOffsetX: 0
  subApOffsetY: 0
  numModes: 32
  disturbanceAmplitude: 0.3
  disturbanceFrequencyHz: 1.2
  disturbanceDriftHz: 0.5
  spotFlux: 4200.0
  backgroundLevel: 120.0
  readNoise: 3.0
  inputStreams: {}
  outputStreams:
    wfsRaw: wfsRaw
    wfs: wfs
  functions:
    - expose

slopes:
  type: SHWFS
  signalType: slopes
  subApSpacing: 8
  subApOffsetX: 0
  subApOffsetY: 0
  imageNoise: 2.0
  contrast: 3
  className: SlopesProcess
  inputStreams:
    wfs: wfs
  outputStreams:
    signal: signal
    signal2D: signal2D
  functions:
    - computeSignal

wfc:
  name: SyntheticWFC
  numActuators: 32
  numModes: 32
  className: SyntheticWFC
  functions:
    - sendToHardware
  inputStreams: {}
  outputStreams:
    wfc: wfc
    wfc2D: wfc2D

loop:
  gain: 0.35
  numDroppedModes: 0
  IMFile: synthetic_identity_im.npy
  className: Loop
  inputStreams:
    signal: signal
  outputStreams:
    wfc: wfc
  functions:
    - standardIntegrator

psf:
  name: SyntheticScienceCamera
  width: 64
  height: 64
  darkCount: 16
  integration: 10
  frameRateHz: 50.0
  peakFlux: 24000.0
  baseSigmaPx: 1.8
  residualBlurGain: 2.2
  className: SyntheticScienceCamera
  inputStreams: {}
  outputStreams:
    psfShort: psfShort
    psfLong: psfLong
    strehl: strehl
    tiptilt: tiptilt
  functions:
    - expose
    - integrate

manager:
  mode: soft-rtc
  componentClasses:
    wfs: SyntheticSHWFS
    slopes: SlopesProcess
    loop: Loop
    wfc: SyntheticWFC
    psf: SyntheticScienceCamera
  componentFiles:
    wfs: ../../pyRTC/hardware/SyntheticSHWFS.py
    slopes: ../../pyRTC/SlopesProcess.py
    loop: ../../pyRTC/Loop.py
    wfc: ../../pyRTC/hardware/SyntheticWFC.py
    psf: ../../pyRTC/hardware/SyntheticScienceCamera.py